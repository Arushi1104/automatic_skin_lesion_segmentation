<svg width="100%" viewBox="0 0 680 920" role="img" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #ffffff;">
  <title>Automated Skin Lesion Segmentation — Pipeline Workflow</title>
  <desc>End-to-end deep learning pipeline: image acquisition, preprocessing, model training, evaluation, and deployment</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#4B5563" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ── STAGE 1: Image Acquisition ── -->
  <rect x="40" y="40" width="600" height="70" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" x="340" y="68" text-anchor="middle" dominant-baseline="central" fill="#085041">Stage 1 — Image acquisition</text>
  <text font-size="12" x="340" y="90" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">HAM10000 dataset · 10,015 dermoscopic images · 7 lesion categories · 256×256 px</text>

  <!-- arrow -->
  <line x1="340" y1="110" x2="340" y2="138" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STAGE 2: Preprocessing ── -->
  <rect x="40" y="140" width="600" height="32" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" x="340" y="156" text-anchor="middle" dominant-baseline="central" fill="#26215C">Stage 2 — Preprocessing</text>

  <!-- sub-step boxes -->
  <rect x="42" y="184" width="106" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="95" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">Grayscale</text>
  <text font-size="11" x="95" y="225" text-anchor="middle" dominant-baseline="central" fill="#534AB7">conversion</text>

  <line x1="148" y1="212" x2="158" y2="212" stroke="#7F77DD" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="160" y="184" width="106" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="213" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">Gaussian</text>
  <text font-size="11" x="213" y="225" text-anchor="middle" dominant-baseline="central" fill="#534AB7">blur</text>

  <line x1="266" y1="212" x2="276" y2="212" stroke="#7F77DD" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="278" y="184" width="124" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="340" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">Blackhat morph.</text>
  <text font-size="11" x="340" y="225" text-anchor="middle" dominant-baseline="central" fill="#534AB7">hair extraction</text>

  <line x1="402" y1="212" x2="412" y2="212" stroke="#7F77DD" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="414" y="184" width="110" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="469" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">Threshold</text>
  <text font-size="11" x="469" y="225" text-anchor="middle" dominant-baseline="central" fill="#534AB7">+ dilation</text>

  <line x1="524" y1="212" x2="534" y2="212" stroke="#7F77DD" stroke-width="0.8" marker-end="url(#arrow)"/>

  <rect x="536" y="184" width="104" height="56" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="588" y="207" text-anchor="middle" dominant-baseline="central" fill="#26215C">Inpainting</text>
  <text font-size="11" x="588" y="225" text-anchor="middle" dominant-baseline="central" fill="#534AB7">hair repair</text>

  <!-- normalisation note -->
  <rect x="40" y="254" width="600" height="32" rx="6" fill="none" stroke="#B4B2A9" stroke-width="0.6" stroke-dasharray="5 3"/>
  <text font-size="11" x="340" y="270" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Resize to 256×256 · Normalize pixel values to [0, 1] · Generate binary segmentation masks</text>

  <!-- arrow -->
  <line x1="340" y1="286" x2="340" y2="314" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STAGE 3: Model Training ── -->
  <rect x="40" y="316" width="600" height="32" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" x="340" y="332" text-anchor="middle" dominant-baseline="central" fill="#042C53">Stage 3 — Model training (supervised, binary ground-truth masks)</text>

  <rect x="62" y="362" width="130" height="62" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="127" y="386" text-anchor="middle" dominant-baseline="central" fill="#042C53">ResUNet++</text>
  <text font-size="11" x="127" y="406" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ASPP + skip conn.</text>

  <rect x="210" y="362" width="130" height="62" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="275" y="386" text-anchor="middle" dominant-baseline="central" fill="#042C53">TransUNet</text>
  <text font-size="11" x="275" y="406" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ViT encoder</text>

  <rect x="358" y="362" width="130" height="62" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="423" y="386" text-anchor="middle" dominant-baseline="central" fill="#042C53">UNet mit_b0</text>
  <text font-size="11" x="423" y="406" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Mix Transformer</text>

  <rect x="506" y="362" width="130" height="62" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text font-size="13" font-weight="600" x="571" y="386" text-anchor="middle" dominant-baseline="central" fill="#042C53">DeepLabV3</text>
  <text font-size="11" x="571" y="406" text-anchor="middle" dominant-baseline="central" fill="#185FA5">ASPP + ResNet</text>

  <line x1="127" y1="424" x2="127" y2="452" stroke="#4B5563" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="275" y1="424" x2="275" y2="452" stroke="#4B5563" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="423" y1="424" x2="423" y2="452" stroke="#4B5563" stroke-width="0.8" marker-end="url(#arrow)"/>
  <line x1="571" y1="424" x2="571" y2="452" stroke="#4B5563" stroke-width="0.8" marker-end="url(#arrow)"/>

  <!-- ── STAGE 4: Evaluation ── -->
  <rect x="40" y="454" width="600" height="32" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" x="340" y="470" text-anchor="middle" dominant-baseline="central" fill="#412402">Stage 4 — Evaluation (IoU · Dice · Accuracy · Precision · Recall · F1)</text>

  <!-- results table -->
  <rect x="40" y="498" width="600" height="28" rx="0" fill="#F5F5F4" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-size="12" font-weight="600" x="127" y="512" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Model</text>
  <text font-size="12" font-weight="600" x="320" y="512" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Accuracy</text>
  <text font-size="12" font-weight="600" x="450" y="512" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Dice score</text>
  <text font-size="12" font-weight="600" x="570" y="512" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">IoU score</text>

  <line x1="230" y1="498" x2="230" y2="638" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="390" y1="498" x2="390" y2="638" stroke="#D3D1C7" stroke-width="0.5"/>
  <line x1="510" y1="498" x2="510" y2="638" stroke="#D3D1C7" stroke-width="0.5"/>

  <rect x="40" y="526" width="600" height="28" rx="0" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-size="12" x="127" y="540" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">ResUNet++</text>
  <text font-size="12" x="320" y="540" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.9586</text>
  <text font-size="12" x="450" y="540" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.9236</text>
  <text font-size="12" x="570" y="540" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.8581</text>

  <rect x="40" y="554" width="600" height="28" rx="0" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-size="12" x="127" y="568" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">TransUNet</text>
  <text font-size="12" x="320" y="568" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.9358</text>
  <text font-size="12" x="450" y="568" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.8640</text>
  <text font-size="12" x="570" y="568" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.7605</text>

  <rect x="40" y="582" width="600" height="28" rx="0" fill="#ffffff" stroke="#D3D1C7" stroke-width="0.5"/>
  <text font-size="12" x="127" y="596" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">UNet mit_b0</text>
  <text font-size="12" x="320" y="596" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.9690</text>
  <text font-size="12" x="450" y="596" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.9429</text>
  <text font-size="12" x="570" y="596" text-anchor="middle" dominant-baseline="central" fill="#3d3d3a">0.8921</text>

  <!-- winner row -->
  <rect x="40" y="610" width="600" height="28" rx="0" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text font-size="13" font-weight="700" x="127" y="624" text-anchor="middle" dominant-baseline="central" fill="#04342C">DeepLabV3 ✓</text>
  <text font-size="13" font-weight="700" x="320" y="624" text-anchor="middle" dominant-baseline="central" fill="#04342C">0.9714</text>
  <text font-size="13" font-weight="700" x="450" y="624" text-anchor="middle" dominant-baseline="central" fill="#04342C">0.9375</text>
  <text font-size="13" font-weight="700" x="570" y="624" text-anchor="middle" dominant-baseline="central" fill="#04342C">0.8896</text>

  <!-- arrow -->
  <line x1="340" y1="638" x2="340" y2="666" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── Best model callout ── -->
  <rect x="160" y="668" width="360" height="64" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1.2"/>
  <text font-size="14" font-weight="700" x="340" y="692" text-anchor="middle" dominant-baseline="central" fill="#04342C">Best model — DeepLabV3</text>
  <text font-size="12" x="340" y="712" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Acc 0.9714 · Dice 0.9375 · IoU 0.8896</text>

  <!-- arrow -->
  <line x1="340" y1="732" x2="340" y2="760" stroke="#4B5563" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- ── STAGE 5: Deployment ── -->
  <rect x="40" y="762" width="600" height="70" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="0.8"/>
  <text font-size="14" font-weight="600" x="340" y="790" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">Stage 5 — Deployment targets</text>
  <text font-size="12" x="340" y="812" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">Clinical diagnostic workflows · Early detection · Teledermatology · Large-scale skin cancer screening</text>

  <!-- footer -->
  <text font-size="11" x="340" y="858" text-anchor="middle" fill="#888780">Arushi Khanna · Thapar Institute of Engineering and Technology · HAM10000 dataset</text>
</svg>
